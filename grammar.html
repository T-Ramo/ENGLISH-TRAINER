<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Trainer — Grammaire</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/vocab.css" />
  <link rel="stylesheet" href="styles/grammar.css" />
</head>
<body>
  <div class="app">
    <div id="topbar-slot"></div>
    <main>
      <div class="container">
        <section class="vocab-hero anim-fade-up">
          <div class="eyebrow">Module 02 — Structures</div>
          <h1>Grammaire</h1>
        </section>
        <div id="stage-root"></div>
      </div>
    </main>
    <div id="footer-slot"></div>
  </div>
  <script src="data/grammar.js"></script>
  <script src="scripts/storage.js"></script>
  <script src="scripts/shared.js"></script>
  <script src="scripts/grammar-engine.js"></script>
  <script>
    Storage.load();
    Shared.renderTopbar('grammar');
    Shared.renderFooter();

    const stageRoot = document.getElementById('stage-root');

    function renderSelection() {
      let html = `<div class="filters-row" style="margin-bottom:30px">
        <button class="btn btn-primary" onclick="renderSelection()">📚 Leçons</button>
        <button class="btn btn-ghost" onclick="renderModes()">⚡ Exercices</button>
      </div>`;
      
      Object.entries(GRAMMAR_CATEGORIES).forEach(([key, cat]) => {
        const lessons = LESSONS.filter(l => l.category === key);
        html += `<h2 class="serif" style="margin: 20px 0">${cat.label}</h2><div class="category-grid">
          ${lessons.map(l => `<div class="lesson-card" onclick="renderLesson('${l.id}')">
            <span class="pill pill-${cat.color}">Tier ${l.tier}</span>
            <h3>${l.label}</h3><p class="muted">${l.summary}</p>
          </div>`).join('')}</div>`;
      });
      stageRoot.innerHTML = html;
    }

    function renderModes() {
      stageRoot.innerHTML = `<div class="vocab-modes">
        ${Object.values(GrammarEngine.MODES).map(m => m.key !== 'lesson' ? `
          <button class="mode-card" onclick="startSession('${m.key}')">
            <div class="mode-icon">${m.icon}</div>
            <div class="mode-title">${m.label}</div>
          </button>` : '').join('')}
      </div>`;
    }

    function renderLesson(id) {
      const l = LESSONS.find(x => x.id === id);
      Storage.markLessonRead(id);
      const cat = GRAMMAR_CATEGORIES[l.category];
      stageRoot.innerHTML = `<div class="lesson-full">
        <button class="btn btn-ghost btn-sm" onclick="renderSelection()">← Retour</button>
        <div style="display:flex;align-items:center;gap:12px;margin:20px 0 8px">
          <span class="pill pill-${cat.color}">Tier ${l.tier}</span>
          <span class="pill pill-ink" style="font-size:0.75rem">${cat.label}</span>
        </div>
        <h1 class="serif" style="margin:0 0 6px">${l.label}</h1>
        <p class="muted" style="margin-bottom:28px">${l.summary}</p>

        ${(l.rules || []).map((r, i) => `
          <div class="rule-block">
            <h3>${i+1}. ${r.title}</h3>
            <p>${r.content.replace(/①/g,'<span class="pill-num">1</span>').replace(/②/g,'<span class="pill-num">2</span>').replace(/③/g,'<span class="pill-num">3</span>').replace(/④/g,'<span class="pill-num">4</span>').replace(/⑤/g,'<span class="pill-num">5</span>').replace(/✅/g,'<span style="color:var(--moss)">✓</span>').replace(/❌/g,'<span style="color:var(--burgundy)">✗</span>')}</p>
          </div>`).join('')}

        ${(l.examples || []).length ? `
          <div class="examples-block" style="margin:28px 0">
            <h4 style="margin-bottom:14px">Exemples</h4>
            ${l.examples.map(e => `
              <div class="example-row">
                <span class="example-en">${e.en}</span>
                <span class="example-fr">${e.fr}</span>
              </div>`).join('')}
          </div>` : ''}

        ${(l.pitfalls || []).length ? `
          <div class="pitfall-box">
            <h4>⚠️ Pièges fréquents</h4>
            <ul>${l.pitfalls.map(p => `<li>${p.replace(/❌/g,'<span style="color:var(--burgundy)">✗</span>').replace(/✅/g,'<span style="color:var(--moss)">✓</span>')}</li>`).join('')}</ul>
          </div>` : ''}

        <div style="margin-top:30px;display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn btn-amber btn-lg" onclick="startSession('lesson', '${l.id}')">S'entraîner sur cette leçon →</button>
          <button class="btn btn-ghost" onclick="renderSelection()">Voir toutes les leçons</button>
        </div>
      </div>`;
    }

    function startSession(mode, lessonId) {
      GrammarEngine.startSession({ mode, lessonId });
      renderQuiz();
    }

    function renderQuiz() {
      const s = GrammarEngine.session;
      const ex = GrammarEngine.current();
      stageRoot.innerHTML = `<div class="quiz-stage">
        <div class="quiz-progress"><div class="progress-bar"><div class="progress-fill" style="width:${(s.index/s.queue.length)*100}%"></div></div></div>
        <div id="quiz-content"></div>
        <div class="quiz-actions" id="submit-area">${ex && ex.type === 'mcq' ? '' : '<button class="btn btn-primary btn-lg" onclick="handleGrammarSubmit()">Valider</button>'}</div>
        <div id="feedback"></div>
      </div>`;
      GrammarUI.renderExercise(ex, document.getElementById('quiz-content'));
    }

    window.handleGrammarSubmit = function(val) {
      const ex = GrammarEngine.current();
      const input = document.getElementById('g-input');
      let finalVal;
      if (val !== undefined) {
        finalVal = val;
      } else if (ex.type === 'reorder') {
        finalVal = GrammarUI.getReorderValue();
      } else if (ex.type === 'error') {
        if (!GrammarEngine.session.errorSelected) return; // aucun mot sélectionné
        finalVal = { word: GrammarEngine.session.errorSelected, correction: input ? input.value : '' };
      } else {
        if (!input) return;
        finalVal = input.value;
      }
      const res = GrammarEngine.submit(finalVal);
      
      document.getElementById('submit-area').style.display = 'none';
      document.getElementById('feedback').innerHTML = `
        <div class="answer-reveal ${res.ok?'':'wrong'}">${res.ok?'✓':'✗'} +${res.pts} pts</div>
        <p>${res.explanation}</p>
        <div style="margin-top:16px; display:flex; gap:8px; justify-content:center">
          <button class="btn btn-ghost btn-sm" onclick="showLessonModal('${ex.lessonId}')">Voir la règle</button>
          <button class="btn btn-amber" onclick="nextQuestion()">Suivant →</button>
        </div>`;
    }

    function nextQuestion() {
      if (GrammarEngine.session.index >= GrammarEngine.session.queue.length - 1) renderSummary();
      else { GrammarEngine.next(); renderQuiz(); }
    }

    function renderSummary() {
      const res = GrammarEngine.finish();
      if (res.diag?.level?.startsWith('B2')) Storage.awardBadge('grammar-b2');
      let html = `<div class="session-summary anim-fade-up">
        <div class="eyebrow">Session terminée</div>
        <div class="summary-score">${res.score}<span style="font-size: 2rem; color: var(--ink-soft)">/${res.total}</span></div>
        <p class="serif">+${res.points} points gagnés</p>`;
        
      if (res.diag) {
        html += `<div class="card" style="margin:32px 0; background:var(--ink); color:var(--paper)">
            <h2 style="color:var(--amber)">Niveau estimé : ${res.diag.level}</h2>
            <p class="muted">Précision : ${Math.round((res.score/res.total)*100)}%</p>
          </div>
          <h3 class="serif" style="margin-bottom:16px">Leçons recommandées :</h3>
          <div class="category-grid" style="grid-template-columns:1fr">${res.diag.recommendations.map(l => `
            <div class="lesson-card" onclick="renderLesson('${l.id}')"><h4>${l.label}</h4><p class="muted">${l.summary}</p></div>`).join('')}</div>`;
      }
      html += `<div style="margin-top:40px"><button class="btn btn-amber btn-lg" onclick="renderSelection()">Continuer l'apprentissage</button></div></div>`;
      stageRoot.innerHTML = html;
    }

    function showLessonModal(id) {
      const l = LESSONS.find(x => x.id === id);
      if (!l) return;
      
      const existing = document.getElementById('g-modal');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.id = 'g-modal';
      overlay.className = 'lesson-modal-overlay';
      overlay.innerHTML = `
        <div class="lesson-modal" style="text-align:left">
          <button class="lesson-modal-close" onclick="this.parentElement.parentElement.remove()">✕</button>
          <h2 class="serif" style="margin-bottom:4px">${l.label}</h2>
          <p class="muted" style="font-size:0.85rem;margin-bottom:16px">${l.summary || ''}</p>
          <div>
            ${(l.rules || []).map((r, i) => `
              <div class="rule-block">
                <h3 style="font-size:0.95rem">${i+1}. ${r.title}</h3>
                <p style="font-size:0.85rem;line-height:1.6">${r.content}</p>
              </div>
            `).join('')}
            ${(l.examples || []).length ? `
              <div class="examples-block" style="margin-top:14px">
                <h4 style="font-size:0.85rem;margin-bottom:8px">Exemples</h4>
                ${l.examples.map(e => `
                  <div class="example-row">
                    <span class="example-en" style="font-size:0.85rem">${e.en}</span>
                    <span class="example-fr" style="font-size:0.8rem">${e.fr}</span>
                  </div>`).join('')}
              </div>` : ''}
            ${(l.pitfalls || []).length ? `
              <div class="pitfall-box" style="margin-top:14px">
                <h4 style="font-size:0.85rem">⚠️ Pièges</h4>
                <ul style="font-size:0.8rem">${l.pitfalls.map(p => `<li>${p}</li>`).join('')}</ul>
              </div>` : ''}
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    }

    renderSelection();
  </script>
</body>
</html>
