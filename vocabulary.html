<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Trainer — Vocabulaire</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/vocab.css" />
</head>
<body>
  <div class="app">
    <div id="topbar-slot"></div>

    <main>
      <div class="container">

        <!-- HERO -->
        <section class="vocab-hero anim-fade-up">
          <div>
            <div class="eyebrow">Module 01 — Lexique</div>
            <h1 style="margin-top: 4px">Vocabulaire</h1>
            <p class="muted" style="margin-top: 12px; max-width: 540px">
              Le mot français s'affiche, tape sa traduction en anglais.
              Les accents et la majuscule sont ignorés. Les fautes mineures sont tolérées.
            </p>
          </div>
          <div class="mono muted" style="font-size: 0.85rem" id="pool-info">— mots disponibles</div>
        </section>

        <!-- MAIN STAGE -->
        <div id="stage-root"></div>

      </div>
    </main>

    <div id="footer-slot"></div>
  </div>

  <!-- Scripts -->
  <script src="data/vocab.js"></script>
  <script src="scripts/storage.js"></script>
  <script src="scripts/shared.js"></script>
  <script src="scripts/vocab-engine.js"></script>
  <script>
    Storage.load();
    Shared.renderTopbar('vocab');
    Shared.renderFooter();

    const stageRoot = document.getElementById('stage-root');
    let filters = { tier: null, theme: null, pos: null };
    let selectedMode = 'discovery';

    // ---- View 1: Setup screen (mode + filters) ----
    function renderSetup() {
      const totalPool = VocabEngine.selectPool(filters).length;
      document.getElementById('pool-info').textContent = totalPool + ' mots dans la sélection';

      const themeOptions = Object.entries(THEMES)
        .map(([k, v]) => `<option value="${k}">${v.label}</option>`).join('');

      stageRoot.innerHTML = `
        <!-- MODES -->
        <div class="vocab-modes">
          ${Object.values(VocabEngine.MODES).map(m => `
            <button class="mode-card ${m.key === selectedMode ? 'active' : ''}" data-mode="${m.key}">
              <div class="mode-icon">${m.icon}</div>
              <div class="eyebrow">${m.key === 'discovery' ? 'Recommandé pour débuter' : m.key === 'challenge' ? 'Pour la vitesse' : 'Mémorisation long terme'}</div>
              <div class="mode-title">${m.label}</div>
              <div class="mode-desc">${m.desc}</div>
            </button>
          `).join('')}
        </div>

        <!-- FILTERS -->
        <div class="filters-row">
          <div class="filter-group">
            <span class="filter-label">Niveau</span>
            <select id="f-tier" class="filter-select">
              <option value="">Tous les niveaux</option>
              <option value="1">Tier 1 — Essentiels</option>
              <option value="2">Tier 2 — Courants</option>
              <option value="3">Tier 3 — Enrichissement</option>
            </select>
          </div>
          <div class="filter-group">
            <span class="filter-label">Thème</span>
            <select id="f-theme" class="filter-select">
              <option value="">Tous les thèmes</option>
              ${themeOptions}
            </select>
          </div>
          <div class="filter-group">
            <span class="filter-label">Type</span>
            <select id="f-pos" class="filter-select">
              <option value="">Tous</option>
              <option value="n">Noms</option>
              <option value="v">Verbes</option>
              <option value="adj">Adjectifs</option>
              <option value="adv">Adverbes</option>
            </select>
          </div>
          <div style="flex: 1"></div>
          <button id="start-btn" class="btn btn-amber">
            Démarrer la session →
          </button>
        </div>

        <div class="start-prompt">
          <h2>Prêt à commencer ?</h2>
          <p>Choisis un mode, ajuste les filtres si tu veux te concentrer sur un thème ou un niveau particulier, puis lance la session. Une session contient ${VocabEngine.MODES[selectedMode].sessionSize} mots.</p>
        </div>
      `;

      // Restore selected filter values
      document.getElementById('f-tier').value = filters.tier || '';
      document.getElementById('f-theme').value = filters.theme || '';
      document.getElementById('f-pos').value = filters.pos || '';

      // Wire mode cards
      stageRoot.querySelectorAll('.mode-card').forEach(card => {
        card.addEventListener('click', () => {
          selectedMode = card.dataset.mode;
          renderSetup();
        });
      });

      // Wire filters
      const updateFilter = () => {
        const t = document.getElementById('f-tier').value;
        const th = document.getElementById('f-theme').value;
        const p = document.getElementById('f-pos').value;
        filters = {
          tier: t ? parseInt(t) : null,
          theme: th || null,
          pos: p || null,
        };
        document.getElementById('pool-info').textContent =
          VocabEngine.selectPool(filters).length + ' mots dans la sélection';
      };
      document.getElementById('f-tier').addEventListener('change', updateFilter);
      document.getElementById('f-theme').addEventListener('change', updateFilter);
      document.getElementById('f-pos').addEventListener('change', updateFilter);

      // Start
      document.getElementById('start-btn').addEventListener('click', () => {
        try {
          VocabEngine.startSession({ mode: selectedMode, filters });
          renderQuestion();
        } catch (e) {
          alert(e.message);
        }
      });
    }

    // ---- View 2: Question screen ----
    function renderQuestion() {
      const w = VocabEngine.current();
      const s = VocabEngine.session;
      s.currentStart = Date.now();
      const total = s.queue.length;
      const idx = s.index;
      const pct = Math.round((idx / total) * 100);
      const showHints = s.mode.hint;

      stageRoot.innerHTML = `
        <div class="quiz-stage">
          <div class="quiz-header">
            <div class="quiz-progress">
              <span class="progress-label mono">${idx + 1} / ${total}</span>
              <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
              <span class="progress-label mono">+${s.points} pts</span>
            </div>
            <div class="quiz-streak ${s.streak >= 5 ? 'big' : ''}">
              ${s.streak >= 1 ? '🔥 ' + s.streak + " d'affilée" : '&nbsp;'}
            </div>
          </div>

          <div class="quiz-prompt">
            <div class="prompt-type">${POS_LABELS[w.pos] || w.pos}</div>
            <div class="prompt-word">${w.fr}${w.hint ? `<span class="prompt-hint">${w.hint}</span>` : ''}</div>
            ${w.example ? `<div class="prompt-pos">Indice : utilisé dans une phrase comme "${maskExample(w.example, w.en)}"</div>` : ''}
          </div>

          <div class="quiz-input-row">
            <input
              type="text"
              id="answer-input"
              class="quiz-input"
              placeholder="Tape la traduction en anglais…"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
            />
            <button id="submit-btn" class="btn btn-primary btn-lg">Valider</button>
          </div>

          ${showHints ? `<div class="quiz-hint" id="hint-zone"></div>` : '<div class="quiz-hint"></div>'}

          <div class="quiz-actions">
            ${showHints ? `<button id="hint-btn" class="btn btn-ghost btn-sm">Indice (−2 pts)</button>` : ''}
            <button id="skip-btn" class="btn btn-ghost btn-sm">Passer</button>
          </div>

          <div class="quiz-feedback" id="feedback"></div>
        </div>
      `;

      const input = document.getElementById('answer-input');
      const submit = document.getElementById('submit-btn');
      input.focus();
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          submit.click();
        }
      });
      submit.addEventListener('click', handleSubmit);
      if (showHints) document.getElementById('hint-btn').addEventListener('click', handleHint);
      document.getElementById('skip-btn').addEventListener('click', handleSkip);
    }

    function maskExample(example, en) {
      // Replace the english word in the example with ___ to make it useful as a hint
      const base = en.split('/')[0].replace(/^to\s+/, '');
      try {
        const re = new RegExp('\\b' + base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\w*\\b', 'gi');
        return example.replace(re, '___');
      } catch (e) {
        return example;
      }
    }

    function handleHint() {
      const hint = VocabEngine.getHint();
      const zone = document.getElementById('hint-zone');
      zone.textContent = hint;
    }

    function handleSkip() {
      // count as wrong, no points
      const w = VocabEngine.current();
      VocabEngine.session.results.push({
        word: w, ok: false, near: false, hintsUsed: VocabEngine.session.hintsUsed,
        timeMs: Date.now() - VocabEngine.session.currentStart, pointsEarned: 0, userInput: '(passé)',
      });
      VocabEngine.updateCardOnAnswer(w, false);
      VocabEngine.session.streak = 0;
      showFeedback(false, false, 0, w.en, true);
    }

    function handleSubmit() {
      const input = document.getElementById('answer-input');
      const value = input.value.trim();
      if (!value) return;
      const res = VocabEngine.submit(value);
      input.classList.add(res.ok ? 'correct' : 'wrong');
      input.disabled = true;
      document.getElementById('submit-btn').disabled = true;
      showFeedback(res.ok, res.near, res.pointsEarned, res.correctAnswer, false);
    }

    function showFeedback(ok, near, pts, correctAnswer, skipped) {
      const fb = document.getElementById('feedback');
      const w = VocabEngine.current();
      const auto = w.example || '';
      fb.innerHTML = `
        <div class="answer-reveal ${ok ? '' : 'wrong'}">
          ${ok ? (near ? '✓ Presque parfait' : '✓ Excellent') : (skipped ? 'Passé' : '✗ Incorrect')}
          <button class="quiz-speaker" id="speak-btn" title="Écouter">🔊</button>
          ${ok && pts > 0 ? `<span class="points-earned">+${pts} pts</span>` : ''}
        </div>
        <div class="answer-detail">
          La bonne réponse était : <strong>${correctAnswer}</strong>
          ${near ? ' (tu avais une petite faute de frappe)' : ''}
          ${auto ? `<br><em style="opacity:0.7">Ex. : ${auto}</em>` : ''}
        </div>
        <div style="margin-top: 16px">
          <button id="next-btn" class="btn btn-amber">
            ${VocabEngine.isFinished() || VocabEngine.session.index >= VocabEngine.session.queue.length - 1 ? 'Voir le résumé' : 'Suivant'} →
          </button>
        </div>
      `;
      // Auto-play audio of correct answer
      if (Storage.state.settings.autoPlayAudio) {
        setTimeout(() => Shared.speak(correctAnswer.split('/')[0]), 250);
      }
      document.getElementById('speak-btn').addEventListener('click', e => {
        e.target.classList.add('playing');
        Shared.speak(correctAnswer.split('/')[0]);
        setTimeout(() => e.target.classList.remove('playing'), 1200);
      });
      document.getElementById('next-btn').addEventListener('click', () => {
        VocabEngine.next();
        if (VocabEngine.isFinished()) renderSummary();
        else renderQuestion();
      });
      // Focus next button so Enter advances
      setTimeout(() => document.getElementById('next-btn').focus(), 100);
      document.getElementById('next-btn').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('next-btn').click();
      });
    }

    // ---- View 3: Summary ----
    function renderSummary() {
      const summary = VocabEngine.finishSession();
      const acc = Math.round((summary.correct / summary.total) * 100);
      const grade = acc >= 90 ? 'Excellent' : acc >= 75 ? 'Très bien' : acc >= 60 ? 'Bien' : acc >= 40 ? 'À retravailler' : 'Difficile';
      const newPoints = Storage.state.points;

      stageRoot.innerHTML = `
        <div class="session-summary">
          <div class="eyebrow">Session terminée — ${summary.mode}</div>
          <div class="summary-score">${summary.correct}<span style="font-size: 2rem; color: var(--ink-soft)">/${summary.total}</span></div>
          <div class="serif" style="font-size: 1.4rem; font-style: italic; color: var(--ink-soft)">${grade} — ${acc}% de précision</div>

          <div class="summary-metrics">
            <div class="summary-metric">
              <div class="summary-metric-val">+${summary.points}</div>
              <div class="summary-metric-lbl">Points gagnés</div>
            </div>
            <div class="summary-metric">
              <div class="summary-metric-val">${summary.streakAchieved}</div>
              <div class="summary-metric-lbl">Meilleure série</div>
            </div>
            <div class="summary-metric">
              <div class="summary-metric-val">${summary.durationS}s</div>
              <div class="summary-metric-lbl">Durée</div>
            </div>
            <div class="summary-metric">
              <div class="summary-metric-val">${Shared.formatNum(newPoints)}</div>
              <div class="summary-metric-lbl">Points totaux</div>
            </div>
          </div>

          ${summary.missed.length ? `
            <div style="margin-top: 32px">
              <div class="eyebrow" style="margin-bottom: 12px">Mots à revoir</div>
              <div class="missed-list">
                ${summary.missed.map(m => `
                  <div class="missed-item">
                    <span class="miss-fr">${m.fr}</span>
                    <span class="miss-en">${m.en}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : `
            <div style="margin-top: 32px; padding: 16px; background: rgba(74, 124, 78, 0.1); border-radius: 8px; color: var(--success); font-weight: 600">
              ✨ Aucun mot raté — session parfaite !
            </div>
          `}

          <div style="margin-top: 40px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap">
            <button id="again-btn" class="btn btn-amber">Refaire une session</button>
            <a href="index.html" class="btn btn-ghost">Retour à l'accueil</a>
          </div>
        </div>
      `;

      document.getElementById('again-btn').addEventListener('click', () => {
        // Update topbar points immediately
        Shared.renderTopbar('vocab');
        renderSetup();
      });
    }

    // Bootstrap
    renderSetup();
  </script>
</body>
</html>
